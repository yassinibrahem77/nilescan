<style>
  .login-wrap { max-width: 420px; margin: 3rem auto; }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--gold);
    border-radius: var(--r);
    padding: 2.2rem 2.4rem;
  }
  .login-icon {
    width: 46px; height: 46px;
    background: var(--gold-dim); border: 1px solid rgba(255,201,71,0.25);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-bottom: 1.2rem;
  }
  .login-title {
    font-family: var(--sans); font-weight: 800; font-size: 1.6rem;
    color: var(--bright); letter-spacing: -0.02em; margin-bottom: 0.25rem;
  }
  .login-sub {
    font-family: var(--mono); font-size: 11px;
    color: var(--dim); margin-bottom: 1.8rem;
  }
  .form-row { margin-bottom: 1.1rem; }
  .demo-box {
    margin-top: 1.5rem;
    background: var(--surface2); border: 1px dashed var(--border2);
    border-radius: 6px; padding: 0.9rem 1rem;
    font-family: var(--mono); font-size: 11px; color: var(--dim); line-height: 1.8;
  }
  .demo-box strong { color: var(--text); }
  .demo-box .role-author { color: var(--gold); }
  .demo-box .role-user   { color: var(--cyan); }
</style>

<div class="login-wrap fade-in">
  <div class="login-card">
    <div class="login-icon">&#9675;</div>
    <h1 class="login-title">Sign in</h1>
    <p class="login-sub">Access your NileScan account</p>

    <form method="POST" action="/login" novalidate>
      <div class="form-row">
        <label class="ns-label" for="username">Username</label>
        <input class="ns-input" type="text" id="username" name="username"
          placeholder="your username" autocomplete="username" required/>
      </div>
      <div class="form-row">
        <label class="ns-label" for="password">Password</label>
        <input class="ns-input" type="password" id="password" name="password"
          placeholder="your password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-primary w-100 mt-2">Sign In &#8594;</button>
    </form>

    <div class="demo-box">
      <strong>Demo accounts:</strong><br/>
      <span class="role-author">author</span> &mdash; yassin / nile123<br/>
      <span class="role-author">author</span> &mdash; admin / admin123<br/>
      <span class="role-user">user</span> &mdash; reader / read456
    </div>
  </div>
</div>
